<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corfiterapias - Portal de Salud & EPEF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --clinical-green: #27ae60; 
            --health-blue: #2980b9; 
            --soft-bg: #f4f7f6;
            --white: #ffffff;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--soft-bg); color: #2c3e50; margin: 0; padding: 0; }
        
        /* Navbar Profesional */
        nav { 
            display: flex; background: var(--white); padding: 15px 5%; 
            justify-content: space-between; align-items: center; 
            box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 800; color: var(--clinical-green); font-size: 1.5rem; letter-spacing: -1px; }
        .nav-actions { display: flex; gap: 15px; }
        .nav-btn { 
            border: none; background: #eee; padding: 12px 20px; 
            border-radius: 25px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .nav-btn.active { background: var(--clinical-green); color: white; }

        /* Contadores de Visitas y Pacientes */
        .stats-bar { 
            display: flex; justify-content: center; gap: 40px; 
            background: var(--health-blue); color: white; padding: 10px; font-size: 0.9rem;
        }
        .stat-item b { font-size: 1.1rem; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }

        /* Tarjetas de Diseño */
        .card { 
            background: var(--white); border-radius: 20px; padding: 30px; 
            box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid #edf2f7;
        }

        h2 { border-left: 5px solid var(--clinical-green); padding-left: 15px; margin-bottom: 25px; font-size: 1.4rem; }

        /* Inputs y Botones HU01 */
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #5a6c7d; }
        select, input { 
            width: 100%; padding: 15px; border: 2px solid #e2e8f0; 
            border-radius: 12px; font-size: 1rem; transition: 0.3s; outline: none;
        }
        select:focus, input:focus { border-color: var(--health-blue); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* Botones de Test con Enlaces */
        .test-links-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        .test-card { 
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 15px; 
            padding: 15px; text-decoration: none; color: inherit; 
            display: flex; align-items: center; gap: 12px; transition: 0.3s;
        }
        .test-card:hover { transform: translateY(-3px); border-color: var(--clinical-green); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .test-card i { font-size: 1.5rem; color: var(--clinical-green); }

        .btn-main { 
            background: var(--clinical-green); color: white; border: none; 
            padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: 700; 
            width: 100%; cursor: pointer; box-shadow: 0 6px 20px rgba(39, 174, 96, 0.2);
            transition: 0.3s; margin-top: 10px;
        }
        .btn-main:hover { filter: brightness(1.1); }

        /* Complicaciones */
        .comp-tag { 
            display: inline-flex; align-items: center; background: #fff5f5; 
            color: #c53030; padding: 8px 15px; border-radius: 8px; margin: 5px; 
            font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid #feb2b2;
        }
        .comp-tag input { width: auto; margin-right: 8px; }

        /* Reporte Final */
        #resultado { display: none; margin-top: 30px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .badge-estadio { 
            display: inline-block; padding: 10px 25px; border-radius: 30px; 
            color: white; font-weight: 800; text-transform: uppercase; margin-bottom: 15px;
        }

        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <div class="logo"><i class="fas fa-heartbeat"></i> CORFITERAPIAS</div>
    <div class="nav-actions">
        <button class="nav-btn active" onclick="toggleRole('pro')">Profesional</button>
        <button class="nav-btn" onclick="toggleRole('pac')">Paciente</button>
    </div>
</nav>

<div class="stats-bar">
    <div class="stat-item"><i class="fas fa-users"></i> Pacientes Atendidos: <b id="count-pacientes">1,248</b></div>
    <div class="stat-item"><i class="fas fa-eye"></i> Visitas al Portal: <b id="count-visitas">45,902</b></div>
</div>

<div class="container" id="reporte-final">
    <div id="area-profesional" class="card">
        <h2><i class="fas fa-user-md"></i> Evaluación Clínica Inicial</h2>
        
        <div class="input-group">
            <label>Nombre del Paciente / Expediente</label>
            <input type="text" id="paciente" placeholder="Ej: Maria Gonzalez">
        </div>

        <div class="grid-2">
            <div class="input-group">
                <label>Diagnóstico</label>
                <select id="diagnostico">
                    <option value="riesgo">Riesgo Metabólico / Sedentarismo</option>
                    <option value="prediabetes">Prediabetes (Resistencia Insulina)</option>
                    <option value="dm2">Diabetes Mellitus Tipo 2</option>
                </select>
            </div>
            <div class="input-group">
                <label>Medicación</label>
                <select id="medicacion">
                    <option value="0">Metformina / Ninguna</option>
                    <option value="2">Insulina / Secretagogos</option>
                    <option value="1">Otros (Antihipertensivos/Estatinas)</option>
                </select>
            </div>
        </div>

        <label style="margin-bottom: 15px;">Complicaciones Presentes (Diabetes Tipo 2):</label>
        <div style="margin-bottom: 25px;">
            <label class="comp-tag"><input type="checkbox" id="c1"> Retinopatía</label>
            <label class="comp-tag"><input type="checkbox" id="c2"> Nefropatía</label>
            <label class="comp-tag"><input type="checkbox" id="c3"> Neuropatía Periférica</label>
            <label class="comp-tag"><input type="checkbox" id="c4"> Neuropatía Autonómica</label>
            <label class="comp-tag"><input type="checkbox" id="c5"> Pie Diabético</label>
            <label class="comp-tag"><input type="checkbox" id="c6"> Vasculopatía</label>
        </div>

        <h2><i class="fas fa-clipboard-list"></i> Valoración Funcional (Tests)</h2>
        <div class="test-links-grid">
            <a href="https://www.rccc.eu/tests/Barthel.html" target="_blank" class="test-card">
                <i class="fas fa-wheelchair"></i>
                <div><strong>Índice de Barthel</strong><br><small>Actividades vida diaria</small></div>
            </a>
            <a href="https://www.paho.org/es/temas/calidad-vida" target="_blank" class="test-card">
                <i class="fas fa-leaf"></i>
                <div><strong>Calidad de Vida</strong><br><small>Bienestar general</small></div>
            </a>
            <a href="https://www.pfizer.es/salud/psicologia/test_gad_7_ansiedad" target="_blank" class="test-card">
                <i class="fas fa-brain"></i>
                <div><strong>Ansiedad (GAD-7)</strong><br><small>Nivel de ansiedad</small></div>
            </a>
            <a href="https://www.pfizer.es/salud/psicologia/test_phq_9_depresion" target="_blank" class="test-card">
                <i class="fas fa-cloud-sun"></i>
                <div><strong>Depresión (PHQ-9)</strong><br><small>Salud emocional</small></div>
            </a>
            <a href="https://cdn.www.gob.pe/uploads/document/file/1498144/Cuestionario%20Internacional%20de%20Actividad%20F%C3%ADsica%20-%20IPAQ.pdf" target="_blank" class="test-card">
                <i class="fas fa-running"></i>
                <div><strong>IPAQ</strong><br><small>Actividad Física</small></div>
            </a>
        </div>

        <button class="btn-main" onclick="generarReporte()">GENERAR PRESCRIPCIÓN Y ESTADIO</button>
    </div>

    <div id="resultado" class="card">
        <div id="reporte-contenido">
            </div>
        <button class="btn-main" style="background: var(--health-blue);" onclick="descargarPDF()">
            <i class="fas fa-file-pdf"></i> DESCARGAR REPORTE PARA HISTORIA CLÍNICA
        </button>
    </div>
</div>

<script>
    // Simulación de contadores (HU04)
    let visitas = 45902;
    setInterval(() => {
        visitas += Math.floor(Math.random() * 3);
        document.getElementById('count-visitas').innerText = visitas.toLocaleString();
    }, 5000);

    function toggleRole(role) {
        alert("Cambiando a vista de " + role + ". Interfaz optimizada con botones grandes (HU01).");
    }

    function generarReporte() {
        const paciente = document.getElementById('paciente').value || "Paciente de Referencia";
        const diag = document.getElementById('diagnostico').value;
        const med = document.getElementById('medicacion').value;
        
        let comps = [];
        if(document.getElementById('c1').checked) comps.push("Retinopatía");
        if(document.getElementById('c2').checked) comps.push("Nefropatía");
        if(document.getElementById('c3').checked) comps.push("Neuropatía Periférica");
        if(document.getElementById('c5').checked) comps.push("Pie Diabético");

        let estadio = "";
        let color = "";
        let prescripcion = "";

        // Lógica de Estadios
        if(diag === 'riesgo' && comps.length === 0) {
            estadio = "Estadio I: Prevención Activa";
            color = "#27ae60";
            prescripcion = "Enfoque en biogénesis mitocondrial. 150 min/semana moderado.";
        } else if(diag === 'dm2' && comps.length < 2) {
            estadio = "Estadio II: Control Metabólico";
            color = "#f39c12";
            prescripcion = "Entrenamiento concurrente (Fuerza + Resistencia). Control glucémico pre/post.";
        } else {
            estadio = "Estadio III: Cuidado Clínico";
            color = "#e74c3c";
            prescripcion = "Intensidad baja (<11 RPE). Supervisión constante. Evitar maniobras de Valsalva.";
        }

        const resDiv = document.getElementById('reporte-contenido');
        document.getElementById('resultado').style.display = "block";

        resDiv.innerHTML = `
            <div style="text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px;">
                <h1 style="color: var(--health-blue); margin:0;">CORFITERAPIAS</h1>
                <p>Reporte de Prescripción del Ejercicio Físico (EPEF)</p>
            </div>
            
            <div class="badge-estadio" style="background: ${color}">${estadio}</div>
            
            <div class="grid-2">
                <div>
                    <p><strong>PACIENTE:</strong> ${paciente}</p>
                    <p><strong>FECHA:</strong> ${new Date().toLocaleDateString()}</p>
                </div>
                <div>
                    <p><strong>RIESGO FARMACOLÓGICO:</strong> ${med === '2' ? 'ALTO' : 'BAJO/MEDIO'}</p>
                </div>
            </div>

            <div style="background: #f4f7f6; padding: 20px; border-radius: 12px; margin: 20px 0;">
                <h3 style="margin-top:0;"><i class="fas fa-stethoscope"></i> Recomendación Clínica</h3>
                <p>${prescripcion}</p>
                <p><strong>Complicaciones detectadas:</strong> ${comps.length > 0 ? comps.join(", ") : "Ninguna reportada"}</p>
            </div>

            <div style="font-size: 0.8rem; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 10px;">
                Este documento es una guía de prescripción basada en estadios clínicos de salud. 
                Debe ser validado por el profesional tratante.
            </div>
        `;

        // Actualizar contador de pacientes (HU04)
        let n = parseInt(document.getElementById('count-pacientes').innerText.replace(',',''));
        document.getElementById('count-pacientes').innerText = (n + 1).toLocaleString();
        
        window.scrollTo({ top: document.getElementById('resultado').offsetTop, behavior: 'smooth' });
    }

    function descargarPDF() {
        const element = document.getElementById('reporte-contenido');
        html2pdf().from(element).set({
            margin: 10,
            filename: 'Reporte_EPEF_Corfiterapias.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).save();
    }
</script>

</body>
</html>
