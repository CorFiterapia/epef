<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPEF Pro + Movilidad Activa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #27ae60; 
            --patient-bg: #f0f7f4;
            --pro-bg: #f4f7f6;
            --white: #ffffff; 
            --warning: #f39c12;
            --danger: #c0392b;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 0; }
        .container { background: var(--white); max-width: 850px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Navegación de Roles */
        nav { display: flex; background: var(--primary); padding: 10px; justify-content: center; gap: 20px; }
        .nav-btn { color: white; border: none; background: none; font-weight: bold; cursor: pointer; padding: 10px 20px; border-radius: 20px; }
        .nav-btn.active { background: var(--accent); }

        header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 20px; padding: 10px 0; }
        
        /* Accesibilidad HU01: Botones grandes y espaciados */
        .btn-grande { 
            min-height: 50px; min-width: 50px; 
            padding: 15px; border-radius: 12px; 
            font-size: 1.1rem; font-weight: bold; 
            margin: 10px 0; cursor: pointer; width: 100%;
            border: none; transition: 0.3s;
        }
        .btn-calc { background: var(--accent); color: white; }
        .btn-pdf { background: var(--primary); color: white; margin-top: 10px; display: none; }

        /* Formulario Profesional */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; font-size: 1rem; margin-bottom: 15px; box-sizing: border-box; }

        /* Escala EVA HU03 */
        .eva-container { display: flex; justify-content: space-between; gap: 15px; margin: 20px 0; }
        .eva-btn { 
            flex: 1; border: 1px solid #ddd; border-radius: 12px; background: white;
            padding: 10px; font-size: 2rem; cursor: pointer; transition: 0.2s;
            text-align: center;
        }
        .eva-btn:hover { transform: scale(1.1); background: #eee; }

        /* Dashboard de Repeticiones HU02 */
        .counter-box { background: #e8f4fd; border-radius: 15px; padding: 20px; text-align: center; margin: 20px 0; border: 2px dashed #2196F3; }
        #rep-count { font-size: 4rem; font-weight: bold; color: #2196F3; display: block; }

        #resultado { margin-top: 25px; display: none; }
        .score-header { text-align: center; padding: 15px; border-radius: 8px; color: white; margin-bottom: 15px; }
        
        .seccion-pro { background: #f8f9fa; border: 1px solid #2c3e50; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
        .seccion-paciente { background: #fff; border: 1px solid #27ae60; padding: 15px; border-radius: 8px; }
        .titulo-seccion { font-weight: bold; text-transform: uppercase; border-bottom: 2px solid; margin-bottom: 10px; padding-bottom: 5px; }
        .pro-title { color: #2c3e50; border-color: #2c3e50; }
        .pac-title { color: #27ae60; border-color: #27ae60; }

        .ejercicios-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .ejercicio-item { border: 1px solid #eee; padding: 10px; border-radius: 8px; text-align: center; font-size: 0.85rem; }
        .mental-box { background: #fff3cd; border-left: 5px solid #ffc107; padding: 10px; margin: 10px 0; font-size: 0.85rem; }

        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <button class="nav-btn active" id="nav-pro" onclick="toggleRole('pro')">PROFESIONAL</button>
    <button class="nav-btn" id="nav-pac" onclick="toggleRole('pac')">PACIENTE</button>
</nav>

<div class="container" id="reporte-final">
    <header>
        <h2 style="margin:0;">EPEF Pro: Diabetes & Rehab</h2>
        <p id="sub-title" style="color: #7f8c8d; margin:0; font-size: 0.85rem;">Prescripción Dual para profesionales de la salud</p>
    </header>
    
    <div id="area-profesional">
        <label>Nombre del Paciente</label>
        <input type="text" id="paciente" placeholder="Ej: Juan Pérez">

        <div class="grid-2">
            <div><label>Diagnóstico</label>
            <select id="diagnostico"><option value="riesgo">Riesgo Metabólico</option><option value="prediabetes">Prediabetes</option><option value="dm2">Diabetes Tipo 2</option></select></div>
            <div><label>Complicaciones</label>
            <select id="complicaciones"><option value="no">Sin Complicaciones</option><option value="si">Con Complicaciones (Vasculares)</option></select></div>
        </div>

        <div class="grid-2">
            <div><label>Medicación</label>
            <select id="medicacion"><option value="ninguna">Ninguna</option><option value="metformina">Metformina</option><option value="otra">Insulina / Secretagogos</option></select></div>
            <div><label>Estado Emocional</label>
            <select id="emocional"><option value="estable">Estable</option><option value="ansiedad">Ansiedad/Estrés</option><option value="depresion">Sint. Depresivos</option></select></div>
        </div>

        <button class="btn-grande btn-calc" onclick="clasificarEPEF()">GENERAR PRESCRIPCIÓN Y PLAN</button>
    </div>

    <div id="area-paciente" style="display: none;">
        <div class="counter-box">
            <span id="rep-count">0</span>
            <p style="margin:0; font-weight: bold;">Repeticiones Detectadas</p>
            <button class="btn-grande btn-calc" style="margin-top:15px;" onclick="resetReps()">REINICIAR CONTADOR</button>
        </div>

        <h3 style="text-align: center;">¿Cómo sientes tu dolor después del ejercicio?</h3>
        <div class="eva-container">
            <button class="eva-btn" onclick="registrarDolor(1)">😊</button>
            <button class="eva-btn" onclick="registrarDolor(2)">🙂</button>
            <button class="eva-btn" onclick="registrarDolor(3)">😐</button>
            <button class="eva-btn" onclick="registrarDolor(4)">😟</button>
            <button class="eva-btn" onclick="registrarDolor(5)">😫</button>
        </div>
    </div>

    <div id="resultado"></div>
    <button id="btn-pdf" class="btn-grande btn-pdf" onclick="generarPDF()">DESCARGAR REPORTE PROFESIONAL (CSV/PDF)</button>
</div>

<script>
let repCount = 0;

// Navegación de Roles
function toggleRole(role) {
    const isPro = role === 'pro';
    document.getElementById('area-profesional').style.display = isPro ? 'block' : 'none';
    document.getElementById('area-paciente').style.display = isPro ? 'none' : 'block';
    document.getElementById('nav-pro').classList.toggle('active', isPro);
    document.getElementById('nav-pac').classList.toggle('active', !isPro);
    document.getElementById('sub-title').innerText = isPro ? "Prescripción Dual para profesionales de la salud" : "Tu plan de entrenamiento diario";
}

// Simulador de Sensor (HU02)
function resetReps() { repCount = 0; updateDisplay(); }
function updateDisplay() { document.getElementById('rep-count').innerText = repCount; }

// Para propósitos de esta demo, incrementamos con un click en el cuadro, 
// pero en móvil se usaría window.DeviceMotionEvent
document.querySelector('.counter-box').onclick = () => { repCount++; updateDisplay(); };

function registrarDolor(nivel) {
    alert("Nivel de dolor " + nivel + " registrado. Tu fisioterapeuta recibirá el reporte.");
}

function clasificarEPEF(){
    const vals = { riesgo:1, prediabetes:2, dm2:3, no:0, si:3, ninguna:0, metformina:1, otra:2, estable:0, ansiedad:1, depresion:2 };
    const pesos = { dx:4, comp:5, med:2, emocional:2 };
    
    let score = (vals[document.getElementById("diagnostico").value] * pesos.dx) + 
                (vals[document.getElementById("complicaciones").value] * pesos.comp) + 
                (vals[document.getElementById("medicacion").value] * pesos.med) + 
                (vals[document.getElementById("emocional").value] * pesos.emocional);

    let e = "", color = "", proRec = "", pacRec = "";

    if(score <= 15){
        e="Ia - Prevención"; color="#27ae60";
        proRec = "Intensidad 60-75% VO2max. Enfoque en biogénesis mitocondrial.";
        pacRec = "Camine a paso rápido 30 min diarios. Use calzado cómodo.";
    } else if(score <= 25){
        e="IIb - Manejo Activo"; color="#f39c12";
        proRec = "Entrenamiento concurrente. Vigilancia de GLUT4 post-esfuerzo.";
        pacRec = "Camine 20 min y use bandas elásticas para sus brazos.";
    } else {
        e="IIIc - Riesgo Clínico"; color="#c0392b";
        proRec = "Carga baja (<3 METs). Evitar maniobra de Valsalva.";
        pacRec = "Camine muy suave 10 min. Si siente fatiga extrema, pare.";
    }

    const resDiv = document.getElementById("resultado");
    resDiv.style.display = "block";
    resDiv.innerHTML = `
        <div class="score-header" style="background:${color}">
            <b>PACIENTE: ${document.getElementById('paciente').value.toUpperCase() || 'S/N'} | SCORE: ${score} | ESTADIO: ${e}</b>
        </div>
        <div class="seccion-pro">
            <div class="titulo-seccion pro-title">Uso Profesional (Bio-clínico)</div>
            <p><b>FITT-VP:</b> ${proRec}</p>
            <p><b>Análisis:</b> Riesgo de hipoglucemia ${document.getElementById("medicacion").value === 'otra' ? 'ALTO' : 'BAJO'}.</p>
        </div>
        <div class="seccion-paciente">
            <div class="titulo-seccion pac-title">Tu Plan (Amigable)</div>
            <p><b>Lo que debes hacer:</b> ${pacRec}</p>
            <div class="mental-box"><b>Seguridad:</b> Revisa tus pies después de cada sesión.</div>
        </div>
    `;
    document.getElementById("btn-pdf").style.display = "block";
}

function generarPDF() {
    const element = document.getElementById('reporte-final');
    // Ocultar botones para el PDF
    const btns = document.querySelectorAll('button');
    btns.forEach(b => b.style.opacity = '0');
    
    html2pdf().set({ 
        margin: 10, 
        filename: 'EPEF_Clinico_Anonimo.pdf', 
        html2canvas: { scale: 2 }, 
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
    }).from(element).save().then(() => {
        btns.forEach(b => b.style.opacity = '1');
    });
}
</script>
</body>
</html>
