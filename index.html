<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPEF PRO - Sistema de Prescripción Clínica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0a2e4d; --clinical: #2980b9; --success: #27ae60; 
            --warning: #f39c12; --danger: #c0392b; --bg: #f8fafc;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #333; margin: 0; }
        
        nav { display: flex; background: var(--primary); padding: 1rem 5%; justify-content: space-between; align-items: center; color: white; }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: 1px; }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }

        .role-selector { display: flex; gap: 10px; margin-bottom: 25px; background: #e2e8f0; padding: 5px; border-radius: 12px; }
        .role-btn { flex: 1; border: none; padding: 15px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; color: #475569; background: transparent; }
        .role-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h2 { color: var(--primary); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-top: 0; font-size: 1.2rem; }

        .grid-input { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }

        /* Complicaciones */
        .comp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin: 15px 0; }
        .comp-item { display: flex; align-items: center; gap: 8px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.8rem; cursor: pointer; background: #fff; }
        .comp-item:has(input:checked) { border-color: var(--clinical); background: #f0f9ff; font-weight: bold; }

        /* Borg Tactil */
        .borg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; margin-top: 20px; }
        .borg-btn { height: 75px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; background: white; font-weight: 800; font-size: 1.2rem; transition: 0.2s; }
        .borg-btn:hover { border-color: var(--clinical); }
        .borg-btn.active { background: var(--clinical); color: white; border-color: var(--primary); }

        .btn-main { background: var(--success); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 1rem; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; }
        
        #resultado-clinico { display: none; }
        .estadio-header { padding: 15px; border-radius: 10px; color: white; text-align: center; font-weight: 800; font-size: 1.3rem; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">EPEF PRO <i class="fas fa-heartbeat"></i></div>
    <div style="font-size: 0.8rem; opacity: 0.8;">Módulo de Prescripción Automatizada</div>
</nav>

<div class="container">
    <div class="role-selector">
        <button class="role-btn active" onclick="switchTab('pro', this)">MÓDULO PROFESIONAL</button>
        <button class="role-btn" onclick="switchTab('pac', this)">MÓDULO PACIENTE</button>
    </div>

    <div id="view-pro">
        <div class="card">
            <h2><i class="fas fa-user-md"></i> Clasificación de Estadio</h2>
            <div class="grid-input">
                <div><label>Nombre del Paciente</label><input type="text" id="p-nombre"></div>
                <div>
                    <label>Condición Base</label>
                    <select id="p-base">
                        <option value="1">Factores de Riesgo / Sedentarismo</option>
                        <option value="2">Prediabetes / Resistencia a la Insulina</option>
                        <option value="3">Diabetes Tipo 2 (Estable)</option>
                        <option value="4">Diabetes (Complicada / Insulinodependiente)</option>
                    </select>
                </div>
            </div>

            <label>Complicaciones del Paciente (DM1/DM2):</label>
            <div class="comp-grid">
                <label class="comp-item"><input type="checkbox" class="check-comp" value="Retinopatía"> Retinopatía</label>
                <label class="comp-item"><input type="checkbox" class="check-comp" value="Nefropatía"> Nefropatía</label>
                <label class="comp-item"><input type="checkbox" class="check-comp" value="Neuropatía"> Neuropatía</label>
                <label class="comp-item"><input type="checkbox" class="check-comp" value="Pie Diabético"> Pie Diabético</label>
                <label class="comp-item"><input type="checkbox" class="check-comp" value="Cetoacidosis"> Riesgo Cetoacidosis</label>
                <label class="comp-item"><input type="checkbox" class="check-comp" value="Hipoglucemia"> Hipo. Inadvertida</label>
                <label class="comp-item"><input type="checkbox" class="check-comp" value="Cardiopatía"> Enf. Cardiovascular</label>
                <label class="comp-item"><input type="checkbox" class="check-comp" value="Cognitivo"> Deterioro Cognitivo</label>
            </div>

            <div class="grid-input">
                <div><label>Barthel (0-100)</label><input type="number" id="v-barthel" value="100"></div>
                <div><label>PHQ-9 (Psicosocial)</label><input type="number" id="v-phq" value="0"></div>
            </div>
            <button class="btn-main" onclick="procesarPrescripcion()">CLASIFICAR Y GENERAR RESULTADO</button>
        </div>
    </div>

    <div id="view-pac" style="display: none;">
        <div class="card" style="text-align:center;">
            <h2>Control de Sesión</h2>
            <div style="background:#1e293b; color:#38bdf8; padding:30px; border-radius:20px; margin-bottom:20px;">
                <div style="font-size:3.5rem; font-weight:900;" id="timer">00:00</div>
                <p style="margin:0; font-weight:700;">TIEMPO ACTIVO</p>
            </div>

            <h3 style="margin-bottom:10px;">Escala de Borg: Marca tu nivel de esfuerzo</h3>
            <div class="borg-grid" id="borg-ui"></div>

            <div class="grid-input" style="margin-top:25px;">
                <button class="btn-main" style="background:var(--clinical);" onclick="iniciarCrono()">INICIAR</button>
                <button class="btn-main" style="background:var(--danger);" onclick="pararCrono()">DETENER</button>
            </div>
        </div>
    </div>

    <div id="resultado-clinico" class="card">
        <div id="pdf-content"></div>
        <button class="btn-main" style="background:var(--primary);" onclick="descargarPDF()">GUARDAR PDF CLÍNICO</button>
    </div>
</div>

<script>
    let timer; let seg = 0;

    function switchTab(tab, btn) {
        document.getElementById('view-pro').style.display = tab === 'pro' ? 'block' : 'none';
        document.getElementById('view-pac').style.display = tab === 'pac' ? 'block' : 'none';
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // Generar Borg UI
    const borgContainer = document.getElementById('borg-ui');
    for(let i=0; i<=10; i++) {
        borgContainer.innerHTML += `<button class="borg-btn" onclick="seleccionarBorg(this, ${i})">${i}</button>`;
    }

    function seleccionarBorg(btn, val) {
        document.querySelectorAll('.borg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function iniciarCrono() {
        timer = setInterval(() => {
            seg++;
            let m = Math.floor(seg/60).toString().padStart(2,'0');
            let s = (seg%60).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }
    function pararCrono() { clearInterval(timer); }

    function procesarPrescripcion() {
        const nombre = document.getElementById('p-nombre').value || "PACIENTE EVALUADO";
        const base = document.getElementById('p-base').value;
        const comps = document.querySelectorAll('.check-comp:checked').length;
        const barthel = parseInt(document.getElementById('v-barthel').value);
        
        let estadio = ""; let color = ""; let desc = ""; let fitt = "";

        if (base == "4" || comps >= 2 || barthel < 60) {
            estadio = "ESTADIO IV";
            color = "#c0392b";
            desc = "Individuos con complicaciones derivadas de la enfermedad y factores de riesgo cardiovasculares.";
            fitt = "F: 2-3 días. I: Borg 2-3 (Muy ligero). T: 10-20 min. T: Movilidad asistida y fuerza funcional.";
        } else if (base == "3") {
            estadio = "ESTADIO III";
            color = "#8e44ad";
            desc = "Individuos con diabetes mellitus tipo 2, con resistencia a la insulina y disfunción mitocondrial.";
            fitt = "F: 3-5 días. I: Borg 4-5. T: 30-40 min. T: Aeróbico y resistencia muscular moderada.";
        } else if (base == "2") {
            estadio = "ESTADIO II";
            color = "#f39c12";
            desc = "Personas con prediabetes que cursan con resistencia a la insulina.";
            fitt = "F: 5 días. I: Borg 5-6. T: 50 min. T: Caminata rápida (EA) y entrenamiento de resistencia (ER).";
        } else {
            estadio = "ESTADIO I";
            color = "#27ae60";
            desc = "Individuos con factores de riesgo para el desarrollo de diabetes tipo 2.";
            fitt = "F: 5-7 días. I: Progresiva (Borg 6-7). T: 60 min. T: Entrenamiento de alta intensidad y cambio de hábitos.";
        }

        document.getElementById('resultado-clinico').style.display = "block";
        document.getElementById('pdf-content').innerHTML = `
            <div class="estadio-header" style="background:${color}">${estadio}</div>
            <div style="padding:10px;">
                <p><strong>Paciente:</strong> ${nombre}</p>
                <p><strong>Descripción:</strong> ${desc}</p>
                <hr style="border:1px solid #eee;">
                <h3 style="color:${color}">Prescripción del Ejercicio (FITT-VP)</h3>
                <p><b>Frecuencia:</b> ${fitt.split('. ')[0]}</p>
                <p><b>Intensidad:</b> ${fitt.split('. ')[1]}</p>
                <p><b>Tiempo:</b> ${fitt.split('. ')[2]}</p>
                <p><b>Tipo:</b> ${fitt.split('. ')[3]}</p>
            </div>
        `;
        window.scrollTo(0, document.body.scrollHeight);
    }

    function descargarPDF() {
        const element = document.getElementById('pdf-content');
        html2pdf().from(element).save('Resultado_Prescripcion_EPEF.pdf');
    }
</script>
</body>
</html>
